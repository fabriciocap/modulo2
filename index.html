<!DOCTYPE html> <!-- Informa ao navegador que este documento usa HTML5 -->
<html lang="pt-BR"> <!-- Define o idioma do documento como português do Brasil e marca o ínicio do documento -->
<head> <!-- Cabeçalho do documento. Aqui fica configurações e informações que não aparecem no corpo da página -->
    <meta charset="UTF-8"> <!-- Define a codificação de caracteres como UTF-8, que suporta a maioria dos caracteres usados em diferentes idiomas como o acento,, emojis e o Ç -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> </head> <!-- Define a viewport para garantir que a página seja exibida corretamente em dispositivos móveis, ajustando a largura da página à largura do dispositivo e definindo o zoom inicial para 1.0 -->
    <title>Meu Primeiro Site</title> </html> <!-- Define o título da página, que aparece na aba do navegador e nos resultados de busca -->
</head> <!-- Fecha a tag head -->
<body> <!-- Corpo do documento. Aqui fica o conteúdo que será exibido na página -->
    <h1>Bem vindo ao meu site!</h1> <!-- Título principal da página, usando a tag h1 para indicar que é o título mais importante -->
    <h2>Site sobre estudo do meu curso de Full Stack</h2> <!-- Subtítulo, usando a tag h2 para indicar que é um título de segundo nível -->
    <p>Este é o meu primeiro site. Estou aprendendo HTML!</p> <!-- Parágrafo de texto, usando a tag p para indicar que é um parágrafo -->
    <ul> <!-- Lista não ordenada, usando a tag ul para indicar que é uma lista de itens sem ordem específica -->
        <li>HTML</li> <!-- Item da lista, usando a tag li para indicar que é um item da lista -->
        <li>CSS</li>
        <li>JavaScript</li>
    
</body>
</html>
